<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<!-- meta name="viewport" content="width=device-width, initial-scale=1.0"--> <!-- Erstmal wieder rausgenommen, da es sonst schlecht auf dem Handy aussieht -->
		<title>TTF Laudenbach</title>
		<!-- externes CSS -->
		<link rel="stylesheet" href="/TTF-Laudenbach/assets/css/style.css">
	</head>
	
	<body>
	
		<div id="header-container"></div>
		
		<div class="grid">
			<div class="box full-width">
				<section class="contact-section">
				
				    <form id="contactForm" class="contact-form">
				
				        <h2>Kontakt</h2>
				
				        <!-- Name -->
				        <div class="form-group">
				            <label for="name">Name *</label>
				            <input type="text" id="name" name="name" required>
				        </div>
				
				        <!-- E-Mail -->
				        <div class="form-group">
				            <label for="email">E-Mail *</label>
				            <input type="email" id="email" name="email" required>
				        </div>
				
				        <!-- Nachricht -->
				        <div class="form-group">
				            <label for="message">Nachricht *</label>
				            <textarea id="message" name="message" rows="5" required></textarea>
				        </div>
				
				        <!-- Consent (DSGVO) -->
				        <div class="form-group form-consent">
				            <input type="checkbox" id="consent" required>
				            <label for="consent">
				                Ich stimme der Verarbeitung meiner Daten gemäß der <a href="/TTF-Laudenbach/pages/footer/datenschutz.html">Datenschutzerklärung</a> zu. *
				            </label>
				        </div>
				
				        <!-- Submit -->
				        <button type="submit" class="button">
				            Nachricht senden
				        </button>
				
				        <!-- Status -->
				        <p id="formStatus" class="form-status"></p>
				
				    </form>
				
				</section>
			</div>
		</div>
    
		<div id="footer-container"></div>
		
		<!-- externes JS -->
		<script src="/TTF-Laudenbach/assets/js/script.js" defer></script>
	</body>
</html>
