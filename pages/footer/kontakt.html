<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TTF Laudenbach</title>
		<!-- externes CSS -->
		<link rel="stylesheet" href="/TTF-Laudenbach/assets/css/style.css">
	</head>
	
	<body>
	
		<div id="header-container"></div>
		
		<div class="grid">
			<section class="contact-section full-width">
			
				<form
				  id="contactForm"
				  class="contact-form"
				  action="https://formspree.io/f/xdavygne"
				  method="POST">
					
				  <h2>Kontakt</h2>
				
				  <input type="hidden" name="_subject" value="Neue Nachricht über ttf-laudenbach.de">
				
				  <div class="form-group">
					<label for="name">Dein Name *</label>
					<input type="text" id="name" name="name" required>
				  </div>
				
				  <div class="form-group">
					<label for="email">Deine E-Mail *</label>
					<input type="email" id="email" name="email" required>
				  </div>
				
				  <div class="form-group">
					<label for="message">Deine Nachricht an uns *</label>
					<textarea id="message" name="message" rows="5" required></textarea>
				  </div>
				
				  <div class="form-group form-consent">
					<input type="checkbox" id="consent" name="consent" required>
					<label for="consent">
					  Ich stimme der Verarbeitung meiner Daten gemäß der
					  <a href="/TTF-Laudenbach/pages/footer/datenschutz.html">Datenschutzerklärung</a>
					  zu. *
					</label>
				  </div>
				
				  <button id="contactSubmitButton" type="submit" class="button contact-submit-button">
					  Nachricht senden
				  </button>
				</form>
				
			</section>
		</div>
    
		<div id="footer-container"></div>
		
		<!-- externes JS -->
		<script src="/TTF-Laudenbach/assets/js/script.js" defer></script>
	</body>
</html>
