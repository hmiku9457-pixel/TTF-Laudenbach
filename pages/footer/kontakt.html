<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TTF Laudenbach</title>
		<!-- externes CSS -->
		<link rel="stylesheet" href="/TTF-Laudenbach/assets/css/style.css">
	</head>
	
	<body>
	
		<div id="header-container"></div>
		
		<div class="grid">
			<section class="contact-section full-width">
			
				<form
				  id="contactForm"
				  class="contact-form"
				  action="https://formspree.io/f/xdavygne"
				  method="POST">
					
				  <h2>Kontakt</h2>
				
				  <input type="hidden" name="_subject" value="Neue Nachricht über ttf-laudenbach.de">
				
				  <div class="form-group">
				    <label for="name">Name *</label>
				    <input type="text" id="name" name="name" required>
				  </div>
				
				  <div class="form-group">
				    <label for="email">E-Mail *</label>
				    <input type="email" id="email" name="email" required>
				  </div>
				
				  <div class="form-group">
				    <label for="message">Nachricht *</label>
				    <textarea id="message" name="message" rows="5" required></textarea>
				  </div>
				
				  <div class="form-group form-consent">
				    <input type="checkbox" id="consent" name="consent" required>
				    <label for="consent">
				      Ich stimme der Verarbeitung meiner Daten gemäß der
				      <a href="/TTF-Laudenbach/pages/footer/datenschutz.html">Datenschutzerklärung</a>
				      zu. *
				    </label>
				  </div>
				
				  <button id="contactSubmitButton" type="submit" class="button contact-submit-button">
					  Nachricht senden
				  </button>
				</form>
			
			</section>
		</div>
    
		<div id="footer-container"></div>
		
		<!-- externes JS -->
		<script src="/TTF-Laudenbach/assets/js/script.js" defer></script>
	</body>
</html>

<script>
	const contactForm = document.getElementById("contactForm");
	const submitButton = document.getElementById("contactSubmitButton");
	
	function isMobileView() {
	  return window.matchMedia("(max-width: 768px)").matches;
	}
	
	function resetSubmitButton() {
	  submitButton.classList.remove("is-sending", "is-success", "is-error");
	  submitButton.textContent = "Nachricht senden";
	  submitButton.disabled = false;
	}
	
	submitButton.addEventListener("click", function () {
	  if (
	    submitButton.classList.contains("is-success") ||
	    submitButton.classList.contains("is-error")
	  ) {
	    resetSubmitButton();
	  }
	});
	
	contactForm.addEventListener("submit", async function (event) {
	  event.preventDefault();
	
	  if (
	    submitButton.classList.contains("is-success") ||
	    submitButton.classList.contains("is-error")
	  ) {
	    resetSubmitButton();
	    return;
	  }
	
	  const formData = new FormData(contactForm);
	
	  submitButton.disabled = true;
	  submitButton.classList.remove("is-success", "is-error");
	  submitButton.classList.add("is-sending");
	  submitButton.textContent = "Wird gesendet...";
	
	  try {
	    const response = await fetch(contactForm.action, {
	      method: contactForm.method,
	      body: formData,
	      headers: {
	        "Accept": "application/json"
	      }
	    });
	
	    submitButton.classList.remove("is-sending");
	
	    if (response.ok) {
	      contactForm.reset();
	
	      if (isMobileView()) {
	        alert("Vielen Dank! Ihre Nachricht wurde erfolgreich gesendet.");
	        resetSubmitButton();
	      } else {
	        submitButton.classList.add("is-success");
	        submitButton.textContent = "Erfolgreich gesendet – Weitere Nachricht senden?";
	        submitButton.disabled = false;
	      }
	    } else {
	      if (isMobileView()) {
	        alert("Beim Senden ist ein Fehler aufgetreten. Bitte versuchen es später erneut.");
	        resetSubmitButton();
	      } else {
	        submitButton.classList.add("is-error");
	        submitButton.textContent = "Fehler – Bitte versuche es später erneut.";
	        submitButton.disabled = false;
	      }
	    }
	  } catch (error) {
	    submitButton.classList.remove("is-sending");
	
	    if (isMobileView()) {
	      alert("Es konnte keine Verbindung hergestellt werden. Bitte versuchen Sie es später erneut.");
	      resetSubmitButton();
	    } else {
	      submitButton.classList.add("is-error");
	      submitButton.textContent = "Fehler – zurücksetzen";
	      submitButton.disabled = false;
	    }
	  }
	});
</script>
