<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TTF Laudenbach</title>
		<!-- externes CSS -->
		<link rel="stylesheet" href="/TTF-Laudenbach/assets/css/style.css">
	</head>
	
	<body>
	
		<div id="header-container"></div>

		<div class="grid">
			<div class="box full-width">
				<h1 class="u-text-center">Historische Fotos</h1>
				<p class="u-text-center">
					Einblicke in die Vereinsgeschichte der TTF Laudenbach.
				</p>
			</div>
		</div>

		<main class="content images-page">

			<section class="images-content" aria-live="polite">
				<div class="box images-loading" id="images-loading">
					<p class="u-text-center">Bilder werden geladen...</p>
				</div>

				<div id="images-gallery-container"></div>
			</section>

			<aside class="box images-event-list" aria-label="Galerien">
				<h2 class="u-text-center">Galerien</h2>

				<div id="images-event-list">
					<p class="u-text-center">Galerien werden geladen...</p>
				</div>
			</aside>

		</main>
				
		<div id="footer-container"></div>
		
		<!-- externes JS -->
		<script src="/TTF-Laudenbach/assets/js/script.js" defer></script>
	</body>
</html>
